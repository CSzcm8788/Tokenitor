name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # 需要 macOS 26 SDK（GlassBackground 用了 Liquid Glass 的 glassEffect API）
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test
